services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rappi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-rappi_ops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rappi} -d ${POSTGRES_DB:-rappi_ops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ops-api:
    build: .
    environment:
      DATA_FILE: /app/data/Sistema de Análisis Inteligente para Operaciones Rappi - Dummy Data (2) (1) (3) (1) (1) (1) (1) (1) (2).xlsx
      DATABASE_URL: postgresql://${POSTGRES_USER:-rappi}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-rappi_ops}
      EXPORT_DIR: /app/outputs
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      N8N_INSIGHTS_WEBHOOK_URL: ${N8N_INSIGHTS_WEBHOOK_URL:-http://n8n:5678/webhook/rappi-ops-executive-insights/run}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      INSIGHTS_BUSINESS_CONTEXT: ${INSIGHTS_BUSINESS_CONTEXT:-}
      LATEX_REPAIR_ATTEMPTS: ${LATEX_REPAIR_ATTEMPTS:-2}
    ports:
      - "${OPS_API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    environment:
      TZ: ${TZ:-America/Bogota}
      GENERIC_TIMEZONE: ${TZ:-America/Bogota}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-false}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ops-api

  web:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_OPS_API_URL: ${NEXT_PUBLIC_OPS_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_N8N_CHAT_WEBHOOK_URL: ${NEXT_PUBLIC_N8N_CHAT_WEBHOOK_URL:-http://localhost:5678/webhook/b2a0878f-58c7-4f89-a98b-2dc29cd637a8/chat}
    ports:
      - "${WEB_APP_PORT:-3000}:3000"
    depends_on:
      - n8n

volumes:
  postgres_data:
  n8n_data:
